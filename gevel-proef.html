<!doctype html>
<html lang="nl"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PROEF — Zie de poort op je eigen gevel</title>
<meta name="robots" content="noindex,nofollow">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--amber:#F4B740;--ant:#2B2A28;--cream:#FFFDF6}
  *{box-sizing:border-box}
  body{font-family:Quicksand,system-ui,sans-serif;margin:0;background:var(--cream);color:var(--ant)}
  header{padding:22px 24px 6px;max-width:920px;margin:0 auto}
  header h1{margin:0 0 4px;font-size:26px;letter-spacing:-.02em}
  header p{margin:0;color:#8a7f64;font-size:14.5px}
  .wrap{max-width:920px;margin:0 auto;padding:16px 24px 60px}
  .stage{position:relative;width:100%;aspect-ratio:16/10;background:#ece6d8 center/cover no-repeat;border:1px solid #e2d8c0;border-radius:16px;overflow:hidden;box-shadow:0 22px 46px -34px rgba(43,42,40,.6)}
  .stage.empty::after{content:"📷  Upload een foto van je gevel";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#9a8f76;font-weight:600}
  #door{position:absolute;left:50%;top:55%;width:38%;transform:translate(-50%,-50%);cursor:grab;touch-action:none;filter:drop-shadow(0 14px 22px rgba(0,0,0,.35))}
  #door.drag{cursor:grabbing}
  #door svg{width:100%;height:auto;display:block}
  .controls{display:flex;flex-wrap:wrap;gap:18px;align-items:center;margin-top:18px;background:#fff;border:1px solid #ece4d0;border-radius:14px;padding:16px 18px}
  .controls label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:#9a8f76;display:block;margin-bottom:6px}
  .ctl{display:flex;flex-direction:column}
  .ctl input[type=range]{width:170px;accent-color:var(--amber)}
  .sw{display:inline-block;width:30px;height:30px;border-radius:8px;border:2px solid #e7ddc6;cursor:pointer;vertical-align:middle;margin-right:6px}
  .sw.on{border-color:var(--amber);box-shadow:0 0 0 3px rgba(244,183,64,.25)}
  .btn{background:var(--amber);color:var(--ant);border:0;border-radius:10px;font:700 14px Quicksand,sans-serif;padding:11px 18px;cursor:pointer}
  .hint{font-size:12.5px;color:#9a8f76;margin-top:10px}
</style>
</head><body>
<header>
  <h1>Zie jouw poort op je eigen gevel</h1>
  <p>Upload een foto, sleep de poort op de opening en pas grootte, kleur en perspectief aan. (Proefversie)</p>
</header>
<div class="wrap">
  <div class="stage empty" id="stage">
    <div id="door"></div>
  </div>
  <div class="controls">
    <button class="btn" id="up">📷 Foto uploaden</button>
    <input type="file" id="file" accept="image/*" hidden>
    <div class="ctl"><label>Breedte</label><input type="range" id="w" min="12" max="80" value="38"></div>
    <div class="ctl"><label>Perspectief</label><input type="range" id="persp" min="-25" max="25" value="0"></div>
    <div class="ctl"><label>Kleur</label><div id="kleur"></div></div>
  </div>
  <p class="hint">De foto blijft op je toestel, er wordt niets geüpload naar een server.</p>
</div>
<script>
(function(){
  var RAL=[{n:"Wit",hex:"#EDEEF0"},{n:"Antraciet",hex:"#2E3133"},{n:"RAL 7016",hex:"#383E42"},{n:"Gouden eik",hex:"#8A5A2B"},{n:"RAL 9006",hex:"#A5A8A6"}];
  var S={kleur:"#2E3133", persp:0};
  var stage=document.getElementById('stage'), door=document.getElementById('door');

  function shade(hex,p){var n=parseInt(hex.slice(1),16),r=n>>16,g=n>>8&255,b=n&255,f=p<0?1+p:1,a=p>0?p:0;
    r=Math.round(r*f+(255-r)*a);g=Math.round(g*f+(255-g)*a);b=Math.round(b*f+(255-b)*a);
    return '#'+(1<<24|r<<16|g<<8|b).toString(16).slice(1);}
  function drawDoor(){
    var c=S.kleur, edge=shade(c,-.25), hi=shade(c,.18), W=300, H=230, n=5, ph=(H-12)/n, s='';
    s+='<defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="'+hi+'"/><stop offset="1" stop-color="'+shade(c,-.08)+'"/></linearGradient></defs>';
    s+='<rect x="2" y="2" width="'+(W-4)+'" height="'+(H-4)+'" rx="5" fill="#cfc6b0"/>';      // kader
    s+='<rect x="8" y="8" width="'+(W-16)+'" height="'+(H-14)+'" rx="3" fill="url(#g)"/>';     // blad
    for(var i=0;i<n;i++){var y=8+i*ph; s+='<rect x="8" y="'+y+'" width="'+(W-16)+'" height="2.5" fill="'+hi+'" opacity=".5"/>';
      s+='<line x1="8" y1="'+(y+ph)+'" x2="'+(W-8)+'" y2="'+(y+ph)+'" stroke="'+edge+'" stroke-width="1.4" opacity=".7"/>';}
    s+='<rect x="'+(W/2-22)+'" y="'+(H-26)+'" width="44" height="7" rx="3.5" fill="'+edge+'"/>';// greep
    door.innerHTML='<svg viewBox="0 0 '+W+' '+H+'" style="transform:perspective(900px) rotateY('+S.persp+'deg)">'+s+'</svg>';
  }
  drawDoor();

  // kleurstalen
  var kl=document.getElementById('kleur');
  kl.innerHTML=RAL.map(function(r,i){return '<span class="sw'+(i==1?' on':'')+'" data-h="'+r.hex+'" title="'+r.n+'" style="background:'+r.hex+'"></span>';}).join('');
  kl.querySelectorAll('.sw').forEach(function(b){b.onclick=function(){kl.querySelectorAll('.sw').forEach(function(x){x.classList.remove('on');});b.classList.add('on');S.kleur=b.dataset.h;drawDoor();};});

  // upload
  document.getElementById('up').onclick=function(){document.getElementById('file').click();};
  document.getElementById('file').onchange=function(e){var f=e.target.files[0];if(!f)return;var u=URL.createObjectURL(f);stage.style.backgroundImage='url('+u+')';stage.classList.remove('empty');};

  // breedte + perspectief
  document.getElementById('w').oninput=function(e){door.style.width=e.target.value+'%';};
  document.getElementById('persp').oninput=function(e){S.persp=+e.target.value;drawDoor();};

  // slepen (muis + touch)
  var dragging=false,ox=0,oy=0,sx=0,sy=0;
  function start(x,y){dragging=true;door.classList.add('drag');var r=door.getBoundingClientRect(),p=stage.getBoundingClientRect();
    ox=r.left-p.left+r.width/2;oy=r.top-p.top+r.height/2;sx=x;sy=y;}
  function move(x,y){if(!dragging)return;var p=stage.getBoundingClientRect();
    var nx=ox+(x-sx),ny=oy+(y-sy);
    door.style.left=(nx/p.width*100)+'%';door.style.top=(ny/p.height*100)+'%';}
  function end(){dragging=false;door.classList.remove('drag');}
  door.addEventListener('pointerdown',function(e){start(e.clientX,e.clientY);e.preventDefault();});
  window.addEventListener('pointermove',function(e){move(e.clientX,e.clientY);});
  window.addEventListener('pointerup',end);
})();
</script>
</body></html>
